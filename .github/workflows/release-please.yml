name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Validate RELEASE_PLEASE_TOKEN
        run: |
          if [ -z "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "RELEASE_PLEASE_TOKEN is required."
            echo "Create a PAT with repo scope and add it as repository secret RELEASE_PLEASE_TOKEN."
            exit 1
          fi
      - uses: googleapis/release-please-action@v4
        id: release
        with:

          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

          release-type: simple
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
