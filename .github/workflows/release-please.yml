name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Optional PAT can be stored as RELEASE_PLEASE_TOKEN.
          # Falls back to GitHub-provided token if PAT is not set.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          # Mixed frontend/backend repo: simple strategy avoids language-specific assumptions.
          release-type: simple
