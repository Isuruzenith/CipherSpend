server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    access_log off;
  }

  location ~* \.wasm$ {
    types { application/wasm wasm; }
    try_files $uri =404;
    access_log off;
  }
}
